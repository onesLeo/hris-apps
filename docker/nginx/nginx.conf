worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # ── Rate limiting zones ──────────────────────────────────────────────────
  # 60 req/min per IP for all API traffic
  limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=60r/m;
  # Tighter limit for auth endpoints (prevents brute-force)
  limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=10r/m;

  limit_req_status 429;

  # ── Upstream pools (scale by adding more api_N entries) ──────────────────
  upstream api_pool {
    least_conn;
    server api:3000;
    # Horizontal scaling: add more instances here, e.g.:
    # server api2:3000;
    # server api3:3000;
    keepalive 32;
  }

  upstream web_pool {
    server web:3000;
    keepalive 16;
  }

  # ── Security headers ─────────────────────────────────────────────────────
  add_header X-Frame-Options          DENY              always;
  add_header X-Content-Type-Options   nosniff           always;
  add_header X-XSS-Protection         "1; mode=block"   always;
  add_header Referrer-Policy          strict-origin      always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

  # Hide nginx version
  server_tokens off;

  # ── API gateway ──────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Auth endpoints — tighter rate limit, no burst
    location ~ ^/api/v1/auth {
      limit_req zone=auth_per_ip nodelay;
      proxy_pass         http://api_pool;
      proxy_http_version 1.1;
      proxy_set_header   Connection     "";
      proxy_set_header   Host           $host;
      proxy_set_header   X-Real-IP      $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 10s;
    }

    # All other API routes
    location /api {
      limit_req zone=api_per_ip burst=20 nodelay;
      proxy_pass         http://api_pool;
      proxy_http_version 1.1;
      proxy_set_header   Connection     "";
      proxy_set_header   Host           $host;
      proxy_set_header   X-Real-IP      $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # Web frontend
    location / {
      proxy_pass         http://web_pool;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }
  }
}
