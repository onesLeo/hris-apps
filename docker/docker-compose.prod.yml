services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hris
      POSTGRES_USER: hris_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hris_user -d hris"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?required}"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?required}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/hris
      KC_DB_USERNAME: hris_user
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Application ───────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://hris_user:${POSTGRES_PASSWORD}@postgres:5432/hris
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/hris/protocol/openid-connect/certs
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Scale with: docker compose -f docker-compose.prod.yml up --scale api=3 -d
    deploy:
      replicas: 1

  worker:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      RUN_MODE: worker
      DATABASE_URL: postgresql://hris_user:${POSTGRES_PASSWORD}@postgres:5432/hris
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - api
    restart: unless-stopped

  # ── Gateway / Load Balancer ───────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
